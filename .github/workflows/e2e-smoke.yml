name: E2E Smoke

on:
  workflow_dispatch:

jobs:
  external-link-smoke:
    runs-on: macos-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run e2e external link smoke
        run: npm run test:e2e

