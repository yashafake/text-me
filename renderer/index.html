<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:;">
  <title>TextMe</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="styles_settings.css">
</head>

<body>
  <div class="app-container">
    <!-- Tab Bar -->
    <div class="tab-bar">
      <div class="drag-region"></div>
      <div class="tabs" id="tabs"></div>

      <div class="tab-actions">
        <button class="settings-btn" id="add-account-btn" title="Добавить аккаунт">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M11 5h2v14h-2zM5 11h14v2H5z" />
          </svg>
        </button>
        <button class="settings-btn" id="settings-btn" title="Настройки">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path
              d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.07-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61 l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41 h-3.84c-0.24,0-0.43,0.17-0.47,0.41L9.25,5.35C8.66,5.59,8.12,5.92,7.63,6.29L5.24,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.74,8.87 C2.62,9.08,2.66,9.34,2.86,9.48l2.03,1.58C4.84,11.36,4.8,11.69,4.8,12s0.02,0.64,0.07,0.94l-2.03,1.58 c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54 c0.05,0.24,0.24,0.41,0.48,0.41h3.84c0.24,0,0.44-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96 c0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.12-0.22,0.07-0.47-0.12-0.61L19.14,12.94z M12,15.6c-1.98,0-3.6-1.62-3.6-3.6 s1.62-3.6,3.6-3.6s3.6,1.62,3.6,3.6S13.98,15.6,12,15.6z" />
          </svg>
        </button>
      </div>
    </div>

    <!-- WebView Container -->
    <div class="webview-container" id="webview-container"></div>
  </div>

  <!-- Settings Modal -->
  <div class="modal-overlay" id="settings-modal">
    <div class="modal">
      <div class="modal-header">
        <h2>Настройки</h2>
        <button class="close-btn" id="close-modal">&times;</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label for="proxy-account-select">
            <span class="label-icon">👤</span> Аккаунт
          </label>
          <select id="proxy-account-select" class="protocol-select"></select>
        </div>

        <div class="separator"></div>

        <div class="form-group">
          <label>
            <span class="label-icon">🧩</span> Тип прокси
          </label>
          <div class="protocol-select-wrapper">
            <select id="proxy-proto" class="protocol-select">
              <option value="socks5">SOCKS5 / HTTP</option>
              <option value="ss">Shadowsocks</option>
            </select>
          </div>

          <div class="proxy-fields socks-fields" id="proxy-socks-fields">
            <input type="text" id="proxy-url" placeholder="socks5://127.0.0.1:9050">
            <div class="credentials-group">
              <input type="text" id="proxy-user" placeholder="Логин (необязательно)" class="auth-input">
              <input type="password" id="proxy-pass" placeholder="Пароль (необязательно)" class="auth-input">
            </div>
            <div class="help-text">Формат ссылки: socks5://host:port или просто host:port</div>
          </div>

          <div class="proxy-fields ss-fields hidden" id="proxy-ss-fields">
            <div class="input-row">
              <input type="text" id="ss-host" placeholder="IP адрес (Host)" class="flex-2">
              <input type="text" id="ss-port" placeholder="Порт" class="flex-1">
            </div>
            <div class="input-row">
              <select id="ss-method" class="flex-1">
                <option value="aes-256-gcm">aes-256-gcm</option>
                <option value="chacha20-ietf-poly1305">chacha20-ietf-poly1305</option>
                <option value="aes-128-gcm">aes-128-gcm</option>
                <option value="none">none</option>
              </select>
            </div>
            <div class="input-row">
              <input type="password" id="ss-pass" placeholder="Пароль" class="flex-full">
            </div>
            <div class="help-text">Или введите ссылку ss:// в поле SOCKS5 выше</div>
          </div>
        </div>

        <div class="separator"></div>

        <div class="form-group">
          <label for="open-external-links-checkbox">
            <span class="label-icon">🌐</span> Внешние ссылки
          </label>
          <label class="toggle-row" for="open-external-links-checkbox">
            <input type="checkbox" id="open-external-links-checkbox">
            <span>Открывать внешние ссылки в системном браузере</span>
          </label>
          <div class="help-text">Если выключить, внешние ссылки будут открываться внутри приложения.</div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" id="cancel-settings">Отмена</button>
        <button class="btn btn-primary" id="save-settings">Сохранить</button>
      </div>
    </div>
  </div>

  <!-- Add Account Modal -->
  <div class="modal-overlay" id="add-account-modal">
    <div class="modal">
      <div class="modal-header">
        <h2>Добавить аккаунт</h2>
        <button class="close-btn" id="close-add-modal">&times;</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label for="account-type-select">
            <span class="label-icon">➕</span> Тип
          </label>
          <select id="account-type-select" class="protocol-select">
            <option value="telegram">Telegram</option>
            <option value="whatsapp">WhatsApp</option>
            <option value="instagram">Instagram</option>
            <option value="whatsapp-business">WhatsApp Business</option>
            <option value="vkontakte">VKontakte</option>
          </select>
        </div>

        <div class="form-group">
          <label for="account-name-input">
            <span class="label-icon">🏷️</span> Имя
          </label>
          <input type="text" id="account-name-input" placeholder="Например: Личный или Работа">
          <div class="help-text">Можно оставить пустым, имя проставится автоматически</div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" id="cancel-add">Отмена</button>
        <button class="btn btn-primary" id="create-account">Добавить</button>
      </div>
    </div>
  </div>

  <script src="renderer.js"></script>
</body>

</html>
